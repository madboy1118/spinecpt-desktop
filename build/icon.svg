<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1120"/>
      <stop offset="100%" style="stop-color:#060911"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="spine" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="40%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)" stroke="url(#accent)" stroke-width="4"/>
  <!-- Stylized spine vertebrae -->
  <g transform="translate(256,256)">
    <!-- Vertebrae segments -->
    <rect x="-40" y="-180" width="80" height="28" rx="8" fill="url(#spine)" opacity="0.9"/>
    <rect x="-44" y="-140" width="88" height="30" rx="9" fill="url(#spine)" opacity="0.92"/>
    <rect x="-48" y="-98" width="96" height="32" rx="10" fill="url(#spine)" opacity="0.95"/>
    <rect x="-50" y="-54" width="100" height="34" rx="10" fill="url(#spine)"/>
    <rect x="-48" y="-8" width="96" height="32" rx="10" fill="url(#spine)"/>
    <rect x="-44" y="36" width="88" height="30" rx="9" fill="url(#spine)" opacity="0.95"/>
    <rect x="-40" y="78" width="80" height="28" rx="8" fill="url(#spine)" opacity="0.92"/>
    <rect x="-36" y="118" width="72" height="26" rx="8" fill="url(#spine)" opacity="0.88"/>
    <!-- Sacrum triangle -->
    <polygon points="-30,156 30,156 0,200" fill="url(#spine)" opacity="0.8"/>
    <!-- Disc spaces (dark gaps between vertebrae) -->
    <rect x="-30" y="-150" width="60" height="8" rx="4" fill="#060911" opacity="0.6"/>
    <rect x="-34" y="-108" width="68" height="8" rx="4" fill="#060911" opacity="0.6"/>
    <rect x="-36" y="-64" width="72" height="8" rx="4" fill="#060911" opacity="0.6"/>
    <rect x="-36" y="-20" width="72" height="10" rx="5" fill="#060911" opacity="0.6"/>
    <rect x="-34" y="26" width="68" height="8" rx="4" fill="#060911" opacity="0.6"/>
    <rect x="-30" y="68" width="60" height="8" rx="4" fill="#060911" opacity="0.6"/>
    <rect x="-26" y="108" width="52" height="8" rx="4" fill="#060911" opacity="0.6"/>
  </g>
  <!-- "S" letter overlay -->
  <text x="256" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="200" fill="url(#accent)" opacity="0.15">S</text>
</svg>
